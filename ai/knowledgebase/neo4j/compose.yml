services:
  neo4j-db:
    image: neo4j:trixie
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: "[\"apoc\"]"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7474" ]
      interval: 30s
      retries: 3
      start_period: 20s
    networks:
      - knowledgebase

  neo4j-cypher:
    image: mcp/neo4j-cypher:latest
    environment:
      NEO4J_URL: bolt://neo4j-db:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8000"
      NEO4J_MCP_SERVER_PATH: "/mcp/"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1"
    ports:
      - "8000:8000"
    networks:
      - knowledgebase

  neo4j-data-modeling:
    image: mcp/neo4j-data-modeling:latest
    environment:
      NEO4J_URL: bolt://neo4j-db:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8001"
      NEO4J_MCP_SERVER_PATH: "/mcp/"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1"
    ports:
      - "8001:8001"
    networks:
      - knowledgebase

  neo4j-memory:
    image: mcp/neo4j-memory:latest
    environment:
      NEO4J_URL: bolt://neo4j-db:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8002"
      NEO4J_MCP_SERVER_PATH: "/mcp/"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1"
    ports:
      - "8002:8002"
    networks:
      - knowledgebase

networks:
  knowledgebase:
    external: true

volumes:
  neo4j_data:
  neo4j_logs:
