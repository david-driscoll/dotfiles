name: ai
version: 1.0.0
description: APM project for ai
author: David Driscoll
targets:
- copilot
- claude
dependencies:
  # Plugin-shaped packages (github/awesome-copilot/plugins/*, dotnet/*/plugins/*,
  # terrylica/cc-skills/plugins/mise) moved to agents.yml - installed natively via
  # setup/install-agent-plugins.ps1 instead of being flattened by APM. See
  # microsoft/apm#739 and #1120.
  apm:
  - github/awesome-copilot/skills/acquire-codebase-knowledge
  - github/awesome-copilot/skills/lsp-setup
  - github/awesome-copilot/instructions/agents.instructions.md
  - github/awesome-copilot/instructions/context-engineering.instructions.md
  - github/awesome-copilot/instructions/instructions.instructions.md
  - github/awesome-copilot/instructions/memory-bank.instructions.md
  - github/awesome-copilot/instructions/powershell.instructions.md
  - github/awesome-copilot/instructions/prompt.instructions.md
  - ComposioHQ/awesome-claude-skills/developer-growth-analysis
  - testdino-hq/playwright-skill
  - majiayu000/claude-skill-registry/skills/data/hk-setup
  - sickn33/antigravity-awesome-skills/skills/mise-configurator
  - terrylica/cc-skills/plugins/itp/skills/mise-configuration
  - terrylica/cc-skills/plugins/itp/skills/mise-tasks
  mcp:
    - name: mise
      args:
        - mcp
      command: mise
      env:
        MISE_EXPERIMENTAL: "1"
      registry: false
      transport: stdio
    - name: aspire
      args:
        - agent
        - mcp
      command: aspire
      type: stdio
