name: agents
version: 1.0.0
description: APM project for ai
author: David Driscoll
targets:
- copilot
- claude
dependencies:
  apm:
  - github/awesome-copilot/plugins/awesome-copilot
  - github/awesome-copilot/plugins/context-engineering
  - github/awesome-copilot/plugins/csharp-dotnet-development
  - github/awesome-copilot/plugins/project-planning
  - github/awesome-copilot/plugins/software-engineering-team
  - github/awesome-copilot/plugins/technical-spike
  - github/awesome-copilot/skills/acquire-codebase-knowledge
  - github/awesome-copilot/instructions/agents.instructions.md
  - github/awesome-copilot/instructions/context-engineering.instructions.md
  - github/awesome-copilot/instructions/instructions.instructions.md
  - github/awesome-copilot/instructions/memory-bank.instructions.md
  - github/awesome-copilot/instructions/powershell.instructions.md
  - github/awesome-copilot/instructions/prompt.instructions.md
  - dotnet/modernize-dotnet/plugins/modernize-dotnet
  - dotnet/skills/plugins/dotnet
  - dotnet/skills/plugins/dotnet-data
  - dotnet/skills/plugins/dotnet-diag
  - dotnet/skills/plugins/dotnet-msbuild
  - dotnet/skills/plugins/dotnet-nuget
  - dotnet/skills/plugins/dotnet-upgrade
  - dotnet/skills/plugins/dotnet-ai
  - dotnet/skills/plugins/dotnet-template-engine
  - dotnet/skills/plugins/dotnet-test
  - dotnet/skills/plugins/dotnet-aspnet
  - ComposioHQ/awesome-claude-skills/developer-growth-analysis
  - anthropics/skills
  - Jeffallan/claude-skills
  - testdino-hq/playwright-skill
  - obra/superpowers
  - sanjay3290/ai-skills/skills/azure-devops
  - sanjay3290/ai-skills/skills/atlassian
  - sanjay3290/ai-skills/skills/postgres
  - sanjay3290/ai-skills/skills/mssql
  - sanjay3290/ai-skills/skills/mysql
  - DuendeSoftware/duende-skills
  - MicrosoftDocs/agent-skills
  local:
  - .apm/instructions/neo4j-knowledgebase.instructions.md
  mcp:
  - io.github.upstash/context7
  - name: github
    registry: false
    transport: stdio
    command: gh
    args:
    - mcp
    env:
      GITHUB_DYNAMIC_TOOLSETS: '1'
  - microsoftdocs/mcp
  - name: mermaid
    registry: false
    transport: http
    url: https://mcp.mermaidchart.com/mcp/
  - name: nuget
    registry: false
    transport: stdio
    command: dnx
    args:
    - NuGet.Mcp.Server
    - --source
    - https://api.nuget.org/v3/index.json
    - --yes
  - name: agentic-workflows
    registry: false
    transport: stdio
    command: gh
    args:
    - aw
    - mcp-server
  - name: duckduckgo
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - duckduckgo-mcp-server
scripts: {}
