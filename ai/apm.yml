  - name: mermaid
    registry: false
    transport: http
    url: https://mcp.mermaidchart.com/mcp/
  - name: nuget
    registry: false
    transport: stdio
    command: dnx
    args:
      - NuGet.Mcp.Server
      - --source
      - https://api.nuget.org/v3/index.json
      - --yes
  - name: agentic-workflows
    registry: false
    transport: stdio
    command: gh
    args:
    - aw
    - mcp-server
  - name: duckduckgo
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - duckduckgo-mcp-server
