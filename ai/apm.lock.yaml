mcp_configs:
  agentic-workflows:
    name: agentic-workflows
    transport: stdio
    args:
    - aw
    - mcp-server
    registry: false
    command: gh
  binlog:
    name: binlog
    transport: stdio
    args:
    - dnx
    - AITools.BinlogMcp
    - --yes
    - --prerelease
    - --add-source
    - https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-tools/nuget/v3/index.json
    registry: false
    tools:
    - '*'
    command: dotnet
  duckduckgo:
    name: duckduckgo
    transport: stdio
    args:
    - -y
    - duckduckgo-mcp-server
    registry: false
    command: npx
  github:
    name: github
    transport: stdio
    env:
      GITHUB_DYNAMIC_TOOLSETS: '1'
    args:
    - mcp
    registry: false
    command: gh
  io.github.upstash/context7:
    name: io.github.upstash/context7
  mermaid:
    name: mermaid
    transport: http
    registry: false
    url: https://mcp.mermaidchart.com/mcp/
  microsoftdocs/mcp:
    name: microsoftdocs/mcp
  nuget:
    name: nuget
    transport: stdio
    args:
    - NuGet.Mcp.Server
    - --source
    - https://api.nuget.org/v3/index.json
    - --yes
    registry: false
    command: dnx
