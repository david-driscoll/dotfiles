    - --yes
    - --prerelease
    - --add-source
    - https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-tools/nuget/v3/index.json
    registry: false
    tools:
    - '*'
    command: dotnet
  duckduckgo:
    name: duckduckgo
    transport: stdio
    args:
    - -y
    - duckduckgo-mcp-server
    registry: false
    command: npx
