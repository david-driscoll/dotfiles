server_port: 6543
mcpServers:
    agentic-workflows:
        args:
            - aw
            - mcp-server
        command: gh
        type: stdio
    aspire:
        args:
            - agent
            - mcp
        command: aspire
        type: stdio
    atlassian:
        type: http
        url: https://mcp.atlassian.com/v1/mcp
    azure:
        args:
            - -y
            - "@azure/mcp"
            - server
            - start
        command: npx
        type: stdio
    binlog:
        args:
            - dnx
            - Microsoft.AITools.BinlogMcp
            - --yes
        command: dotnet
        type: stdio
    context7:
        headers:
            Accept: application/json, text/event-stream
            CONTEXT7_API_KEY: "TODO"
        timeout: 10000
        type: http
        url: https://mcp.context7.com/mcp
    duckduckgo:
        args:
            - -y
            - duckduckgo-mcp-server
        command: npx
        transport: stdio
    github:
        args:
            - mcp
        command: gh
        env:
            GITHUB_DYNAMIC_TOOLSETS: "1"
        transport: stdio
    mermaid:
        transport: http
        url: https://mcp.mermaidchart.com/mcp/
    microsoft-docs:
        transport: http
        url: https://learn.microsoft.com/api/mcp
    mise:
        args:
            - mcp
        command: mise
        env:
            MISE_EXPERIMENTAL: "1"
        registry: false
        transport: stdio
    nuget:
        args:
            - NuGet.Mcp.Server
            - --source
            - https://api.nuget.org/v3/index.json
            - --yes
        command: dnx
        transport: stdio
    playwright:
        args:
            - -y
            - "@playwright/mcp@latest"
            - --extension
            - --browser
            - msedge
        command: npx
        env:
            PLAYWRIGHT_MCP_EXTENSION_TOKEN: n_Znwpce_q6rQTfsCW4Zgtjj5xyDYfs61NmDjrWHKME
        type: stdio
    slack:
        oauthClientId: "TODO"
        oauthPublicClient: true
        type: http
        url: https://mcp.slack.com/mcp
    squad-cli:
        args:
            - -y
            - "@bradygaster/squad-cli@latest"
            - state-mcp
        command: npx
        type: stdio
clients:
    copilot:
        config_path: ~/.copilot/mcp-config.json
        enabled:
            - github
            - microsoft-docs
            - mermaid
            - nuget
            - duckduckgo
            - mise
            - context7-vscode
            - atlassian
            - azure
            - context7
            - agentic-workflows
            - aspire
            - playwright
            - squad-cli
            - binlog
            - slack
    dotfiles:
        config_path: ~/dotfiles/mcpm/mcp.json
        enabled:
            - github
            - microsoft-docs
            - mermaid
            - nuget
            - duckduckgo
            - mise
            - context7-vscode
            - atlassian
            - azure
            - context7
            - agentic-workflows
            - aspire
            - playwright
            - squad-cli
            - binlog
            - slack
    lmstudio:
        config_path: ~/.lmstudio/mcp.json
        enabled:
            - github
            - microsoft-docs
            - mermaid
            - nuget
            - duckduckgo
            - mise
            - context7-vscode
            - atlassian
            - azure
            - context7
            - agentic-workflows
            - aspire
            - playwright
            - squad-cli
            - binlog
            - slack
    vscode:
        config_path: ~/.claude.json
        enabled:
            - github
            - microsoft-docs
            - mermaid
            - nuget
            - duckduckgo
            - mise
            - context7-vscode
            - atlassian
            - azure
            - context7
            - agentic-workflows
            - aspire
            - playwright
            - squad-cli
            - binlog
            - slack
