name: agents
version: 1.0.0
description: APM project for agents
author: David Driscoll
targets:
  - copilot
  - claude
dependencies:
  # cskiro/claudex/plugins/otel-monitoring-setup moved to agents.yml - installed
  # natively via setup/install-agent-plugins.ps1 instead of being flattened by APM.
  # See microsoft/apm#739 and #1120.
  apm:
  - emaynard/claude-family-history-research-skill#v1.0.6
  mcp:
  - name: kubernetes
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - kubernetes-mcp-server
  - name: pulumi
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@pulumi/mcp-server'
    - stdio
  - name: mise
    registry: false
    transport: stdio
    command: mise
    env:
      MISE_EXPERIMENTAL: '1'
    args:
    - mcp
scripts: {}
