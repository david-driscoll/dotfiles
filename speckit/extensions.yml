installed:
- agent-context
- arch
- companion
- fleet
- memorylint
- squad
- superb
- v-model
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  - extension: squad
    command: speckit.squad.generate
    enabled: true
    optional: false
    priority: 10
    prompt: Spec updated — regenerate Squad agent definitions?
    description: Keeps Squad agents aligned as the spec evolves
    condition: null
  - extension: superb
    command: speckit.superb.brainstorm
    enabled: true
    optional: true
    priority: 10
    prompt: Refine the new spec.md with Superpowers brainstorming before clarification
      or planning?
    description: 'Optional spec refinement gate. Uses an installed superpowers brainstorming
      skill to strengthen the active Spec Kit spec.md while preserving Spec Kit ownership
      of specification creation.

      '
    condition: null
  - extension: companion
    command: speckit.companion.capture
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture?
    description: Record specify completion (currentStep=specify, status=specified)
      into .spec-context.json
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  - extension: superb
    command: speckit.superb.plan-gate
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.superb.plan-gate?
    description: 'Mandatory Plan gate. Verifies plan completeness and injects SDD
      directives into plan.md for agentic workers.

      '
    condition: null
  - extension: companion
    command: speckit.companion.capture-plan
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture-plan?
    description: Record plan completion (currentStep=plan, status=planned) into .spec-context.json
    condition: null
  after_tasks:
  - extension: squad
    command: speckit.squad.route
    enabled: true
    optional: false
    priority: 10
    prompt: Tasks generated — route them to Squad agents?
    description: Distributes new tasks to the right agents automatically
    condition: null
  - extension: v-model
    command: speckit.v-model.trace
    enabled: true
    optional: false
    priority: 10
    prompt: Run traceability matrix to validate requirement coverage?
    description: Builds the traceability matrix after tasks are generated
    condition: null
  - extension: superb
    command: speckit.superb.review
    enabled: true
    optional: false
    priority: 10
    prompt: Review tasks.md for coverage and TDD-readiness before implementation?
    description: 'Catches missing or under-specified tasks at planning time. Produces
      a requirement coverage and TDD-readiness report. Bridge-native logic.

      '
    condition: null
  - extension: fleet
    command: speckit.fleet.review
    enabled: true
    optional: true
    priority: 10
    prompt: Run cross-model review to evaluate plan and tasks before implementation?
    description: Pre-implementation review gate
    condition: null
  - extension: companion
    command: speckit.companion.capture-tasks
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture-tasks?
    description: Record tasks completion (currentStep=tasks, status=ready-to-implement)
      into .spec-context.json
    condition: null
  before_implement:
  - extension: superb
    command: speckit.superb.controller
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.superb.controller?
    description: 'Mandatory Controller gate. Bridges installed execution and quality
      skills to orchestrate task implementation.

      '
    condition: null
  after_implement:
  - extension: superb
    command: speckit.superb.verify
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.superb.verify?
    description: 'Mandatory completion gate. Bridges an installed superpowers verification-before-completion
      skill and extends it with spec-kit spec-coverage checks. Prevents false completions.

      '
    condition: null
  - extension: companion
    command: speckit.companion.capture-implement
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture-implement?
    description: Per-task journaling on implement (currentStep=implement; status=implemented
      when all tasks checked)
    condition: null
  before_constitution:
  - extension: memorylint
    command: speckit.memorylint.audit
    enabled: true
    optional: false
    priority: 10
    prompt: Run MemoryLint audit to generate a boundary report before constitution
      generation?
    description: ''
    condition: null
  after_constitution:
  - extension: memorylint
    command: speckit.memorylint.audit
    enabled: true
    optional: false
    priority: 10
    prompt: Run MemoryLint audit to check for conflicts between constitution and AGENTS.md?
    description: ''
    condition: null
  before_plan:
  - extension: memorylint
    command: speckit.memorylint.load-agents
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.memorylint.load-agents?
    description: 'Mandatory gate: Load AGENTS.md to enforce core rules and prevent
      rule drift during the planning (plan.md generation) phase.'
    condition: null
