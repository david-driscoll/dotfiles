# Root aggregator for native plugin manifests. Symlinked to ~/.apm/agents.yml
# alongside marketplaces.json/config.json/mise.toml (see setup/setup-osx.sh,
# setup/setup.ps1). Lists every agents.yml to combine when installing plugins
# via install-agent-plugins.ps1 (default, no -AgentsYamlPath given). Paths are
# relative to the dotfiles repo root (parent of this .apm/ directory).
#
# Marketplace definitions are NOT listed per-source anymore - they live in a
# single shared marketplaces.yml (repo root) that install-agent-plugins.ps1
# always reads alongside whichever agents.yml(s) are in scope.
name: root
description: Aggregates ai/agents.yml and agents/agents.yml for plugin installation

sources:
  - ai/agents.yml
  - agents/agents.yml
